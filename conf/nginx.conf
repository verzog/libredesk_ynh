#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  # Force HTTPS (the yunohost_panel module sets the header)
  proxy_set_header X-Forwarded-Proto $scheme;

  # Pass WebSocket upgrade headers (LibreDesk uses WebSockets for real-time updates)
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "Upgrade";

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_cache_bypass $http_upgrade;

  # Prevent SSOwat from injecting YunoHost user credentials into LibreDesk
  # requests. LibreDesk manages its own authentication; an injected
  # Authorization header for a non-existent user causes 401 on every request.
  proxy_set_header Authorization "";

  # Increase timeouts for long-running WebSocket connections
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;

  proxy_pass http://127.0.0.1:__PORT__/;
}

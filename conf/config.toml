[app]
log_level = "info"
env = "prod"
check_updates = true
encryption_key = "__ENCRYPTION_KEY__"

[app.server]
address = "127.0.0.1:__PORT__"
socket = ""
# YunoHost terminates TLS at nginx and proxies plain HTTP to LibreDesk.
# Secure cookies must be disabled so the browser does not silently drop them.
disable_secure_cookies = true
read_timeout = "5s"
write_timeout = "5s"
max_body_size = 104857600
read_buffer_size = 65536
keepalive_timeout = "10s"

[db]
host = "127.0.0.1"
port = 5432
user = "__DB_USER__"
password = "__DB_PWD__"
database = "__DB_NAME__"
ssl_mode = "disable"
max_open = 25
max_idle = 25
max_lifetime = "300s"

[redis]
address = "127.0.0.1:6379"
user = ""
password = ""
db = 0

[upload]
provider = "fs"

[upload.fs]
upload_path = "__DATA_DIR__/uploads"

[upload.s3]
url = ""
access_key = ""
secret_key = ""
region = ""
bucket = ""
bucket_path = ""
expiry = "30m"

[message]
outgoing_queue_workers = 10
incoming_queue_workers = 10
message_outgoing_scan_interval = "50ms"
incoming_queue_size = 5000
outgoing_queue_size = 5000

[notification]
concurrency = 2
queue_size = 2000

[automation]
worker_count = 10

[autoassigner]
autoassign_interval = "5m"

[webhook]
workers = 5
queue_size = 10000
timeout = "15s"
allowed_hosts = []

[conversation]
unsnooze_interval = "5m"
draft_retention_period = "360h"

[sla]
evaluation_interval = "5m"
